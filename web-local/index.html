<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slowcort</title>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="icon" href="favicon.ico">
  <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-body">
<!-- ── Sidebar ──────────────────────────────────────────────────── -->
<aside class="sidebar">
  <div class="sidebar-header">songs</div>
  <div class="history-list" id="historyList">
    <p class="history-empty">your songs<br>will appear here</p>
  </div>
</aside>

<!-- ── Main ─────────────────────────────────────────────────────── -->
<main class="main">
  <div class="card">
    <div class="dropzone" id="dropzone" role="button" tabindex="0">
      <div class="note-icon">♫</div>
      <p><strong>drop an audio file</strong> or click to browse</p>
      <p class="hint">mp3 · wav · ogg · flac · m4a · aac</p>
      <input type="file" id="fileInput" accept="audio/*">
    </div>

    <div class="file-badge" id="fileBadge">
      <span style="opacity:.6;font-size:.9rem">♪</span>
      <span class="file-badge-name" id="fileBadgeName"></span>
      <span class="file-badge-change" id="changeFile">change</span>
    </div>

    <!-- YouTube search / import -->
    <div class="yt-divider"><span>or import from YouTube</span></div>
    <div class="yt-row">
      <input type="text" id="ytInput" placeholder="search or paste a URL…" spellcheck="false" autocomplete="off">
      <button class="btn btn-yt" id="ytBtn">search</button>
    </div>
    <div class="yt-results" id="ytResults"></div>
    <div class="yt-progress-wrap" id="ytProgressWrap">
      <div class="yt-bar" id="ytBar"></div>
    </div>
    <div class="yt-status" id="ytStatus"></div>

    <canvas id="visualizer" width="460" height="64"></canvas>

    <div class="sliders">
      <div class="slider-row">
        <span class="slider-label">speed</span>
        <input type="range" id="speedSlider" min="0.5" max="2.0" step="0.01" value="0.85">
        <span class="slider-val" id="speedVal">0.85×</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">reverb</span>
        <input type="range" id="reverbSlider" min="0" max="1" step="0.01" value="0.40">
        <span class="slider-val" id="reverbVal">55%</span>
      </div>
      <div class="slider-row" id="pitchRow">
        <span class="slider-label" style="display:flex;align-items:center;justify-content:flex-end;gap:0.35rem;">
          pitch
          <button id="pitchLinkBtn" title="Natural: speed and pitch move together (best quality)" style="background:none;border:none;cursor:pointer;padding:0;line-height:1;font-size:0.75rem;color:var(--accent);opacity:0.5;flex-shrink:0;">⛓</button>
        </span>
        <input type="range" id="pitchSlider" min="-24" max="12" step="0.5" value="-0.5">
        <span class="slider-val" id="pitchVal">−3st</span>
      </div>
    </div>

    <div class="status" id="status">upload a file to begin</div>
  </div>
</main>

</div><!-- /.app-body -->

<!-- ── Player bar ────────────────────────────────────────────────── -->
<footer class="player-bar">
  <input type="range" id="seekSlider" min="0" max="100" step="0.1" value="0" disabled>
  <div class="player-bar-inner">
    <div class="player-song-wrapper">
      <div id="playerSongArea" title="Edit track metadata">
        <img id="playerCover" src="" alt="Album Cover">
        <div class="player-song-name empty" id="playerSongName">no track loaded</div>
        <div class="edit-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
          </svg>
        </div>
      </div>
    </div>
    <div class="player-controls">
      <button class="btn" id="prevBtn" disabled title="Previous Track">
        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="btn" id="playBtn" disabled>
        <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><polygon points="6,3 20,12 6,21"/></svg>
      </button>
      <button class="btn" id="nextBtn" disabled title="Next Track">
        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
      <button class="btn" id="loopBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <polyline points="17 1 21 5 17 9"></polyline>
          <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
          <polyline points="7 23 3 19 7 15"></polyline>
          <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
        </svg>
      </button>
    </div>
    <div class="player-time">
      <span id="seekCurrent">0:00</span>
      <span>/</span>
      <span id="seekTotal">0:00</span>
    </div>
    <div class="player-vol">
      <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
      <span class="slider-val" id="volumeVal">100%</span>
    </div>
  </div>
</footer>

<!-- ── Meta Search Modal ── -->
<div id="metaModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); backdrop-filter:blur(2px); z-index:9999; align-items:center; justify-content:center;">
  <div class="card" style="width:90%; max-width:400px; padding:1.5rem; box-shadow:0 10px 30px rgba(0,0,0,0.5);">
    <h3 style="margin:0 0 1rem 0; font-size:1rem; color:var(--text); font-weight:500;">Fix Track Info</h3>
    <div class="yt-row" style="margin-bottom:1rem;">
      <input type="text" id="metaInput" placeholder="Artist - Title..." spellcheck="false" autocomplete="off" style="width:100%;">
      <button id="metaSearchBtn" class="btn btn-yt">search</button>
    </div>
    <div id="metaResults" class="yt-results" style="margin-bottom:1rem; max-height:250px;"></div>
    <div style="text-align:right;">
      <button id="metaCancelBtn" class="btn" style="background:transparent; color:var(--text-dim); padding:0.5rem 1rem;">cancel</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
